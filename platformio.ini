; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; https://docs.platformio.org/en/latest/boards/espressif32/dfrobot_firebeetle2_esp32e.html

[platformio]
default_envs = dfrobot_firebeetle2_esp32e_debug

[env]
; Pin to 6.x to stay on Arduino Core 2.x (ESP-IDF 4.x). The pioarduino
; platform (installed for the Xiao ESP32C6) registers as "espressif32" and
; shadows the official one, pulling in Arduino Core 3.x whose new ESP-IDF 5.x
; drivers (touch, ADC, etc.) conflict with the legacy APIs used in this project.
platform = espressif32@^6
framework = arduino
lib_deps = 
	fastled/FastLED
	milesburton/DallasTemperature
	OneWire=https://github.com/PaulStoffregen/OneWire.git#master ; adds support for ESP32-C6 after 2.3.8 release (no release since)
	Wire
	zinggjm/GxEPD2
	dfrobot/DFRobot_BMP3XX
	HULP=https://github.com/boarchuz/HULP.git
upload_protocol = esptool
;upload_port = /dev/ttyUSB0
;monitor_port = /dev/ttyUSB0
monitor_speed = 115200
monitor_filters = time, esp32_exception_decoder
debug_tool = esp-prog
debug_init_break = tbreak setup

[env:debug]
build_flags = -DSLEEP_INTERVAL_S=5
;build_flags = -DPPK2_DEBUG -DSLEEP_INTERVAL_S=5
; looks like setting build_type here doesn't work unfortunately, so set it in the individual envs below

[env:release]
build_flags = -DDISABLE_SERIAL


[env:dfrobot_firebeetle2_esp32e]
;lib_deps =
;	${env.lib_deps}
;	HULP=https://github.com/boarchuz/HULP.git

[env:dfrobot_firebeetle2_esp32e_debug]
board = dfrobot_firebeetle2_esp32e
build_type = debug
extends = dfrobot_firebeetle2_esp32e, debug

[env:dfrobot_firebeetle2_esp32e_release]
board = dfrobot_firebeetle2_esp32e
build_type = release
extends = dfrobot_firebeetle2_esp32e, release


[env:seeed_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip ; adds support for ESP32-C6 through arduino core 3.0
build_flags = -DNO_ULP -DDISABLE_DISPLAY

[env:seeed_xiao_esp32c6_debug]
board = seeed_xiao_esp32c6
lib_ignore = HULP ; Ideally we'd conditionally add this only on platforms where HULP is required, but that fails platformio dependency system, so just ignore it on this platform where it's not needed
build_flags = ${env:debug.build_flags} ${env:seeed_xiao_esp32c6.build_flags}
build_type = debug
extends = seeed_xiao_esp32c6, debug

[env:seeed_xiao_esp32c6_release]
board = seeed_xiao_esp32c6
lib_ignore = HULP ; Ideally we'd conditionally add this only on platforms where HULP is required, but that fails platformio dependency system, so just ignore it on this platform where it's not needed
build_flags = ${env:release.build_flags} ${env:seeed_xiao_esp32c6.build_flags}
build_type = release
extends = seeed_xiao_esp32c6, release
