; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; https://docs.platformio.org/en/latest/boards/espressif32/dfrobot_firebeetle2_esp32e.html

[platformio]
default_envs = dfrobot_firebeetle2_esp32e_debug

[env]
; Local platform fork: LP core ULP support (C6) + lib recompile fix (all boards)
platform = /home/antoine/stuff/platform-espressif32
framework = arduino
extra_scripts = pre:scripts/pre_build_fonts.py
lib_deps = 
	adafruit/Adafruit NeoPixel
	milesburton/DallasTemperature
	OneWire=https://github.com/PaulStoffregen/OneWire.git#master ; adds support for ESP32-C6 after 2.3.8 release (no release since)
	Wire
	GxEPD2=https://github.com/antoinecellerier/GxEPD2.git#add-gdeh0576t81-support
	dfrobot/DFRobot_BMP3XX
	HULP=https://github.com/antoinecellerier/HULP.git#arduino-core-3x-compat
upload_protocol = esptool
;upload_port = /dev/ttyUSB0
;monitor_port = /dev/ttyUSB0
monitor_speed = 115200
monitor_filters = time, esp32_exception_decoder
debug_tool = esp-prog
debug_init_break = tbreak setup

[env:debug]
build_flags = -DSLEEP_INTERVAL_S=5
;build_flags = -DPPK2_DEBUG -DSLEEP_INTERVAL_S=5
; looks like setting build_type here doesn't work unfortunately, so set it in the individual envs below

[env:release]
build_flags = -DDISABLE_SERIAL


[env:dfrobot_firebeetle2_esp32e]

[env:dfrobot_firebeetle2_esp32e_debug]
board = dfrobot_firebeetle2_esp32e
board_build.partitions = huge_app.csv
build_type = debug
extends = dfrobot_firebeetle2_esp32e, debug
; build_flags from [env:debug] don't inherit via extends — must set explicitly
; Uncomment to fill display with mock data on first boot for layout testing:
;build_flags = ${env:debug.build_flags}
; -Wl,-T: lib recompile needs ROM memset (recompiled spi_flash calls memset
; with flash cache disabled during boot)
build_flags = ${env:debug.build_flags} -Wl,-Tesp32.rom.libc-funcs.ld
; Lib recompile: enable DPP + trim unused framework BSS to fit under
; pioarduino's ~48KB DRAM ceiling on non-PSRAM boards
custom_sdkconfig = file://sdkconfig.custom
custom_component_remove =
	espressif/esp_insights
	espressif/esp_rainmaker
	espressif/rmaker_common
	espressif/esp_diag_data_store
	espressif/esp_diagnostics

[env:dfrobot_firebeetle2_esp32e_release]
board = dfrobot_firebeetle2_esp32e
build_type = release
extends = dfrobot_firebeetle2_esp32e, release


[env:seeed_xiao_esp32c6]
; Custom platform fork adds LP core ULP support for Arduino-only projects
platform = /home/antoine/stuff/platform-espressif32
build_flags = -DDISABLE_DISPLAY
lib_ignore = HULP ; HULP is ESP32 ULP FSM only — not used on C6 (LP core instead)

[env:seeed_xiao_esp32c6_debug]
extends = seeed_xiao_esp32c6, debug
platform = ${env:seeed_xiao_esp32c6.platform}
board = seeed_xiao_esp32c6
lib_ignore = ${env:seeed_xiao_esp32c6.lib_ignore}
; ARDUINO_USB_CDC_ON_BOOT=0 disables USB CDC for power testing (saves ~20mA during sleep)
;build_flags = ${env:debug.build_flags} ${env:seeed_xiao_esp32c6.build_flags}
build_flags = ${env:debug.build_flags} ${env:seeed_xiao_esp32c6.build_flags} -DARDUINO_USB_CDC_ON_BOOT=0
build_unflags = -DARDUINO_USB_CDC_ON_BOOT=1
build_type = debug

[env:seeed_xiao_esp32c6_release]
extends = seeed_xiao_esp32c6, release
platform = ${env:seeed_xiao_esp32c6.platform}
board = seeed_xiao_esp32c6
lib_ignore = ${env:seeed_xiao_esp32c6.lib_ignore}
; ARDUINO_USB_CDC_ON_BOOT=0 disables USB CDC for power testing (saves ~20mA during sleep)
build_flags = ${env:release.build_flags} ${env:seeed_xiao_esp32c6.build_flags} -DARDUINO_USB_CDC_ON_BOOT=0
build_unflags = -DARDUINO_USB_CDC_ON_BOOT=1
build_type = release
