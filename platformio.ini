; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; https://docs.platformio.org/en/latest/boards/espressif32/dfrobot_firebeetle2_esp32e.html

[platformio]
default_envs = dfrobot_firebeetle2_esp32e_debug

[env]
platform = espressif32
framework = arduino
lib_deps = 
	fastled/FastLED
	milesburton/DallasTemperature
	Wire
	zinggjm/GxEPD2
	dfrobot/DFRobot_BMP3XX
	https://github.com/boarchuz/HULP.git
upload_protocol = esptool
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
monitor_filters = time, esp32_exception_decoder
debug_tool = esp-prog
debug_init_break = tbreak setup

[env:debug]
build_flags = -DPPK2_DEBUG -DSLEEP_INTERVAL_S=5
build_type = debug

[env:release]
build_flags = -DDISABLE_SERIAL
build_type = release

[env:dfrobot_firebeetle2_esp32e_debug]
board = dfrobot_firebeetle2_esp32e
extends = debug

[env:dfrobot_firebeetle2_esp32e_release]
board = dfrobot_firebeetle2_esp32e
extends = release
